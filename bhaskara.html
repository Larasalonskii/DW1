<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskara</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe6f0, #f9f0ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #d63384;
            margin-bottom: 20px;
        }

        label,
        input,
        #result {
            display: block;
            margin: 10px auto;
        }

        input[type="number"] {
            width: 200px;
            padding: 10px;
            border: 2px solid #ffc0cb;
            border-radius: 10px;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 8px #ffb6c1;
        }

        input[type="button"] {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="button"]:hover {
            background: #ff1493;
            transform: scale(1.05);
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #fff0f5;
            border-radius: 15px;
            font-size: 18px;
            color: #333;
            min-width: 200px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Fórmula de Bhaskara</h1>

        <label for="inputA">A:</label>
        <input type="number" id="inputA">

        <label for="inputB">B:</label>
        <input type="number" id="inputB">

        <label for="inputC">C:</label>
        <input type="number" id="inputC">

        <input type="button" value="Calcular" onclick="calcular()">

        <div id="result">...</div>
    </div>

    <script>
        function calcular() {
            let a = parseFloat(document.getElementById("inputA").value);
            let b = parseFloat(document.getElementById("inputB").value);
            let c = parseFloat(document.getElementById("inputC").value);

            let delta = b ** 2 - 4 * a * c;

            if (a == 0) {
                document.getElementById("result").innerHTML =
                    "Isso não é uma equação de 2º grau";
            }
            else if (delta < 0) {
                document.getElementById("result").innerHTML =
                    "Não existem raízes reais";
            }
            else {
                let x1 = (-b + Math.sqrt(delta)) / (2 * a);
                let x2 = (-b - Math.sqrt(delta)) / (2 * a);

                x1 = Number.isInteger(x1) ? x1 : x1.toFixed(2);
                x2 = Number.isInteger(x2) ? x2 : x2.toFixed(2);

                document.getElementById("result").innerHTML =
                    "x1 = " + x1 + "<br>x2 = " + x2;
            }
        }
    </script>
</body>

</html>
