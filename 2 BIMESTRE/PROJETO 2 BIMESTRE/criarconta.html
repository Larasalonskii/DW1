<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelfy - criar conta</title>
    <link rel="stylesheet" href="stylelogin.css">
</head>
<body>
    <header>
        <h2>CRIAR CONTA</h2>
        <campos>
            <input type="text" id="nomeleitor" placeholder="NOME COMPLETO"><br><br>
            <input type="text" id="cpfleitor" placeholder="CPF"><br><br>
            <input type="text" id="usuario" placeholder="USUÁRIO"><br><br>
            <input type="password" id="senha" placeholder="CRIE UMA SENHA"><br><br>
            <p id="mensagem" style="color: red; font-weight: bold;"></p>
            <button onclick="criarEEntrar()" id="btnentrar">CRIAR CONTA E ENTRAR</button>
        </campos>
    </header>

    <script>
        const API_URL = "http://localhost:3000/api";

        async function criarEEntrar() {
            const nome = document.getElementById("nomeleitor").value.trim();
            const cpf = document.getElementById("cpfleitor").value.trim();
            const usuario = document.getElementById("usuario").value.trim();
            const senha = document.getElementById("senha").value;
            const mensagem = document.getElementById("mensagem");
            mensagem.textContent = "";

            if (!nome || !cpf || !usuario || !senha) {
                mensagem.textContent = "Preencha todos os campos.";
                return;
            }

            try {
                const resposta = await fetch(`${API_URL}/cadastro`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, cpf, usuario, senha })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    // Ex: "Usuário ou CPF já cadastrado."
                    mensagem.textContent = dados.erro || "Erro ao criar conta.";
                    return;
                }

                // Conta criada no banco e já logada: salva o token e vai pra livraria
                localStorage.setItem("token", dados.token);
                localStorage.setItem("usuario", JSON.stringify(dados.usuario));

                window.location.href = "livraria.html";

            } catch (erro) {
                console.error(erro);
                mensagem.textContent = "Não foi possível conectar ao servidor.";
            }
        }
    </script>
</body>
</html>
