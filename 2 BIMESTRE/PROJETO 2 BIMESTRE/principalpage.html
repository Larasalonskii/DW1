<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livraria</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="boasvindas">
    <h2>Sejam bem-vindos à nossa livraria digital</h2>
</div>

<div class="wrapper">

<h1>MENSAGENS</h1>

<!-- SELECT -->
<div class="menu-genero">

    <select id="livroSelect">
        <option value="">Selecione Gênero</option>
        <option>Romance</option>
        <option>Ficção Distópica</option>
        <option>Sátira Política</option>
        <option>Realismo Mágico</option>
        <option>Fantasia</option>
        <option>Policial</option>
        <option>Ficção Científica</option>
        <option>Poesia</option>
        <option>Contos</option>
        <option>Novela</option>
        <option>Aventura</option>
        <option>Terror</option>
        <option>Suspense</option>
        <option>Distopia</option>
        <option>Infantil</option>
        <option>Fábula</option>
        <option>Épico</option>
    </select>

    <div class="botoes-principais">

        <button onclick="consultarGeneroSelecionado()">
            Procurar Gênero
        </button>

        <button onclick="consultarQtdFavoritosGenero()">
            Favoritos do Gênero
        </button>

        <button onclick="consultarLivros()">
            Consultar Todos os Livros
        </button>

        <button onclick="consultarLivrosFavoritos()">
            Consultar Favoritos
        </button>

        <button onclick="location.href='index.html'">
            Ver Tabela
        </button>

    </div>
</div>

<div id="chat"></div>

<div id="tabelaLivros"></div>

</div>

<script>

function adicionarMensagem(texto, tipo) {
    const chat = document.getElementById('chat');
    const p = document.createElement('p');
    p.textContent = texto;
    p.className = tipo === 'enviado' ? 'msg-enviada' : 'msg-recebida';
    chat.appendChild(p);
}

// ================= FETCH BASE =================

async function getLivros() {
    const res = await fetch('http://localhost:3001/livros');
    return await res.json();
}

// ================= LISTAR =================

async function consultarLivros() {

    const data = await getLivros();

    const container = document.getElementById("tabelaLivros");

    let html = `
    <table>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Gênero</th>
            <th>Ano</th>
            <th>⭐</th>
            <th>Ações</th>
        </tr>
    `;

    data.livros.forEach(l => {

        html += `
        <tr>
            <td>${l.id_livro}</td>
            <td>${l.titulo.trim()}</td>
            <td>${l.genero.trim()}</td>
            <td>${l.ano_pulicacao}</td>
            <td>${l.favorito ? "⭐" : "—"}</td>
            <td>
                <button onclick="favoritarLivro(${l.id_livro})">⭐</button>
            </td>
        </tr>
        `;
    });

    html += `</table>`;

    container.innerHTML = html;
}

// ================= FILTRO GÊNERO =================

async function consultarGeneroSelecionado() {

    const genero = document.getElementById('livroSelect').value;

    if (!genero) {
        adicionarMensagem("Selecione um gênero", "recebido");
        return;
    }

    const data = await getLivros();

    const filtrados = data.livros.filter(
        l => l.genero.trim().toLowerCase() === genero.trim().toLowerCase()
    );

    adicionarMensagem(genero, "enviado");

    let msg = "";

    filtrados.forEach(l => {
        msg += `${l.titulo.trim()} - ${l.ano_pulicacao}\n`;
    });

    adicionarMensagem(msg || "Nenhum livro encontrado", "recebido");
}

// ================= FAVORITOS =================

async function consultarLivrosFavoritos() {

    const data = await getLivros();

    const fav = data.livros.filter(l => l.favorito === true);

    adicionarMensagem("⭐ Favoritos", "enviado");

    let msg = "";

    fav.forEach(l => {
        msg += `${l.titulo.trim()} (${l.genero})\n`;
    });

    adicionarMensagem(msg || "Nenhum favorito", "recebido");
}

// ================= QTD FAVORITOS =================

async function consultarQtdFavoritosGenero() {

    const genero = document.getElementById('livroSelect').value;

    if (!genero) {
        adicionarMensagem("Selecione um gênero", "recebido");
        return;
    }

    const data = await getLivros();

    const qtd = data.livros.filter(l =>
        l.genero.trim().toLowerCase() === genero.trim().toLowerCase()
        && l.favorito === true
    ).length;

    adicionarMensagem(`Favoritos em ${genero}: ${qtd}`, "recebido");
}

async function favoritarLivro(id) {
    console.log("clicou no id:", id);

    const res = await fetch(`http://localhost:3001/favoritar/${id}`, {
        method: "POST"
    });

    const data = await res.json();

    console.log("resposta:", data);

    consultarLivros();
}

async function bloquearLivro(id) {

    await fetch(`http://localhost:3001/bloquear/${id}`, {
        method: "POST"
    });

    consultarLivros();
}

</script>

</body>
</html>
