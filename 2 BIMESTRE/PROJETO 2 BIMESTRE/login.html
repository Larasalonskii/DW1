<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelfy</title>
    <link rel="stylesheet" href="stylelogin.css">
</head>
<body>
    <header>
        <h2>LOGIN</h2>
        <campos>
            <input type="text" id="usuario" placeholder="USUÁRIO"><br><br>
            <input type="password" id="senha" placeholder="SENHA"><br><br>
            <p id="mensagem" style="color: red; font-weight: bold;"></p>
            <button onclick="entrar()" id="btnentrar">ENTRAR</button>
            <h4>ainda não tem uma conta?</h4>
            <a href="criarconta.html">Clique Aqui</a>
        </campos>
    </header>

    <script>
        // Endereço do seu servidor Node. Troque se publicar em outro lugar.
        const API_URL = "http://localhost:3000/api";

        async function entrar() {
            const usuario = document.getElementById("usuario").value.trim();
            const senha = document.getElementById("senha").value;
            const mensagem = document.getElementById("mensagem");
            mensagem.textContent = "";

            if (usuario === "") {
                mensagem.textContent = "Por favor insira um nome de usuário";
                return;
            }
            if (senha === "") {
                mensagem.textContent = "Por favor insira sua senha";
                return;
            }

            try {
                const resposta = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ usuario, senha })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    // Servidor não encontrou o usuário OU a senha não bateu.
                    // dados.erro vem do backend: "Usuário ou senha inválidos."
                    mensagem.textContent = dados.erro || "Usuário ou senha inválidos.";
                    return;
                }

                // Login deu certo: salva o token pra usar depois nas outras telas
                localStorage.setItem("token", dados.token);
                localStorage.setItem("usuario", JSON.stringify(dados.usuario));

                // Vai pra tela principal da livraria
                window.location.href = "principalpage.html";

            } catch (erro) {
                console.error(erro);
                mensagem.textContent = "Não foi possível conectar ao servidor.";
            }
        }
    </script>
</body>
</html>
