<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Conceito</title>

    <link rel="stylesheet" href="notas.css">
</head>

<body>

    <div class="container">
        <h1>Média de Aproveitamento</h1>

        <div class="grid">

            <div class="campo">
                <label>RA</label>
                <input type="number" id="inputra">
            </div>

            <div class="campo">
                <label>Nome</label>
                <input type="text" id="inputnome">
            </div>

            <div class="campo">
                <label>Nota 1º Bimestre</label>
                <input type="number" id="inputn1">
            </div>

            <div class="campo">
                <label>Nota 2º Bimestre</label>
                <input type="number" id="inputn2">
            </div>

            <div class="campo">
                <label>Nota 3º Bimestre</label>
                <input type="number" id="inputn3">
            </div>

            <div class="campo">
                <label>Nota 4º Bimestre</label>
                <input type="number" id="inputn4">
            </div>

            <div class="campo full">
                <label>Média dos Exercícios</label>
                <input type="number" id="inputme">
            </div>

        </div>

        <button onclick="fcalcular()">Calcular</button>

        <p id="resp">...</p>
        <p id="aprov"></p>
    </div>

    <script src="notas.js"></script>

</body>
</html>
