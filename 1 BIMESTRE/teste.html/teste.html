<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            pointer-events: none;
        }

        #verse {
            font-family: 'Georgia', serif;
            font-style: italic;
            color: rgba(255, 220, 120, 0);
            font-size: 13px;
            line-height: 1.8;
            text-align: center;
            padding: 0 20px 24px;
            transition: color 1.2s ease;
            text-shadow: 0 0 18px rgba(255, 200, 80, 0.6);
            max-width: 620px;
        }

        #verse.visible {
            color: rgba(255, 220, 120, 0.88);
        }

        #label-night {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(180, 160, 255, 0.5);
            font-size: 11px;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: translateY(-50%) rotate(180deg);
        }

        #label-day {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 220, 100, 0.5);
            font-size: 11px;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
            writing-mode: vertical-rl;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="overlay">
        <div id="verse"></div>
    </div>
    <span id="label-night">NOITE</span>
    <span id="label-day">DIA</span>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const W = () => canvas.width;
        const H = () => canvas.height;

        // --- State ---
        let t = 0;
        const SCENE_DUR = [380, 300, 340, 400, 999]; // frames per scene
        const SCENES = ['journey', 'portal', 'gateway', 'revelation', 'paths'];
        let scene = 0;
        let sceneT = 0;

        // --- Stars ---
        const stars = Array.from({ length: 260 }, () => ({
            x: Math.random(), y: Math.random(),
            r: Math.random() * 1.4 + 0.3,
            twinkle: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.03 + 0.01
        }));

        // --- Horses ---
        class Horse {
            constructor(offsetX, offsetY, phase) {
                this.ox = offsetX; this.oy = offsetY; this.phase = phase;
            }
            draw(cx, cy, gallop) {
                const g = gallop;
                const px = cx + this.ox;
                const py = cy + this.oy;
                const legCycle = Math.sin(t * 0.18 + this.phase);
                ctx.save();
                ctx.translate(px, py);
                // body
                ctx.beginPath();
                const bodyGrad = ctx.createLinearGradient(-28, -10, 28, 10);
                bodyGrad.addColorStop(0, 'rgba(255,240,180,0.95)');
                bodyGrad.addColorStop(1, 'rgba(220,180,80,0.85)');
                ctx.fillStyle = bodyGrad;
                ctx.ellipse(0, 0, 28, 12, 0.2, 0, Math.PI * 2);
                ctx.fill();
                // neck
                ctx.beginPath();
                ctx.moveTo(18, -6);
                ctx.bezierCurveTo(26, -14, 30, -20, 24, -26);
                ctx.bezierCurveTo(20, -22, 18, -16, 12, -10);
                ctx.closePath();
                ctx.fillStyle = 'rgba(255,240,180,0.95)';
                ctx.fill();
                // head
                ctx.beginPath();
                ctx.ellipse(24, -29, 8, 5, -0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,240,180,0.9)';
                ctx.fill();
                // mane
                ctx.beginPath();
                ctx.moveTo(18, -20);
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(20 + Math.sin(i + t * 0.1) * 3, -22 - i * 3);
                }
                ctx.strokeStyle = 'rgba(255,200,60,0.7)'; ctx.lineWidth = 2; ctx.stroke();
                // legs
                const legs = [
                    [-14, 10, legCycle * 8],
                    [-4, 12, -legCycle * 8],
                    [8, 12, legCycle * 10],
                    [18, 10, -legCycle * 10]
                ];
                legs.forEach(([lx, ly, swing]) => {
                    ctx.beginPath();
                    ctx.moveTo(lx, ly);
                    ctx.lineTo(lx + swing * 0.3, ly + 16 + Math.abs(swing) * 0.2);
                    ctx.strokeStyle = 'rgba(200,160,60,0.9)'; ctx.lineWidth = 2.5; ctx.stroke();
                });
                // tail
                ctx.beginPath();
                ctx.moveTo(-26, 0);
                ctx.bezierCurveTo(-38, 4 + legCycle * 4, -42, 8, -36, 14);
                ctx.strokeStyle = 'rgba(255,210,80,0.7)'; ctx.lineWidth = 3; ctx.stroke();
                // glow
                const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 36);
                grd.addColorStop(0, 'rgba(255,220,80,0.12)');
                grd.addColorStop(1, 'rgba(255,220,80,0)');
                ctx.fillStyle = grd;
                ctx.beginPath(); ctx.arc(0, 0, 36, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        const horses = [
            new Horse(-46, 0, 0),
            new Horse(0, 0, Math.PI * 0.5),
            new Horse(46, 0, Math.PI)
        ];

        // --- Maidens (daughters of sun) ---
        class Maiden {
            constructor(x, phase) { this.xOff = x; this.phase = phase; }
            draw(cx, cy) {
                const px = cx + this.xOff;
                const py = cy;
                const sway = Math.sin(t * 0.08 + this.phase) * 3;
                ctx.save();
                ctx.translate(px + sway, py);
                // robe
                const rg = ctx.createLinearGradient(0, -40, 0, 40);
                rg.addColorStop(0, 'rgba(255,240,180,0.9)');
                rg.addColorStop(1, 'rgba(255,200,80,0.4)');
                ctx.beginPath();
                ctx.moveTo(-8, -40);
                ctx.bezierCurveTo(-10, -10, -14, 10, -18, 40);
                ctx.lineTo(18, 40);
                ctx.bezierCurveTo(14, 10, 10, -10, 8, -40);
                ctx.closePath();
                ctx.fillStyle = rg; ctx.fill();
                // head glow / veil removed
                const hg = ctx.createRadialGradient(0, -46, 0, 0, -46, 14);
                hg.addColorStop(0, 'rgba(255,240,120,0.9)');
                hg.addColorStop(0.5, 'rgba(255,200,60,0.5)');
                hg.addColorStop(1, 'rgba(255,200,60,0)');
                ctx.fillStyle = hg;
                ctx.beginPath(); ctx.arc(0, -46, 14, 0, Math.PI * 2); ctx.fill();
                // halo ring
                ctx.beginPath();
                ctx.arc(0, -46, 11, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,230,80,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
                // light rays from hands
                ctx.beginPath();
                ctx.moveTo(-6, 0); ctx.lineTo(-28, -10 + sway * 2);
                ctx.moveTo(6, 0); ctx.lineTo(28, -8 + sway * 2);
                ctx.strokeStyle = 'rgba(255,220,100,0.35)'; ctx.lineWidth = 2; ctx.stroke();
                ctx.restore();
            }
        }

        const maidens = [
            new Maiden(-80, 0),
            new Maiden(-26, 1.1),
            new Maiden(28, 2.2),
            new Maiden(82, 3.3)
        ];

        // --- Particles ---
        const particles = Array.from({ length: 90 }, () => ({
            x: Math.random(), y: Math.random(),
            vx: (Math.random() - 0.5) * 0.4, vy: -Math.random() * 0.5 - 0.1,
            life: Math.random(), maxLife: Math.random() * 80 + 40,
            r: Math.random() * 2 + 0.5,
            hue: Math.random() * 40 + 30
        }));

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx / W(); p.y += p.vy / H();
                p.life++;
                if (p.life > p.maxLife || p.y < 0 || p.x < 0 || p.x > 1) {
                    p.x = Math.random(); p.y = 1; p.life = 0;
                    p.maxLife = Math.random() * 80 + 40;
                }
            });
        }

        function drawParticles(alpha = 1) {
            particles.forEach(p => {
                const a = (1 - p.life / p.maxLife) * alpha * 0.6;
                ctx.beginPath();
                ctx.arc(p.x * W(), p.y * H(), p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue + 200},80%,80%,${a})`;
                ctx.fill();
            });
        }

        // --- Portal ---
        function drawPortal(cx, cy, openAmt, flash) {
            // stone arch/lintel
            ctx.save();
            ctx.translate(cx, cy);
            const w = 130, h = 200;
            // door frame stones
            const stoneG = ctx.createLinearGradient(-w / 2 - 20, 0, w / 2 + 20, 0);
            stoneG.addColorStop(0, 'rgba(80,70,60,0.9)');
            stoneG.addColorStop(0.5, 'rgba(130,115,95,0.9)');
            stoneG.addColorStop(1, 'rgba(80,70,60,0.9)');
            ctx.fillStyle = stoneG;
            // Left pillar
            ctx.fillRect(-w / 2 - 22, -h / 2, 22, h);
            // Right pillar
            ctx.fillRect(w / 2, -h / 2, 22, h);
            // Lintel (dintel)
            ctx.fillRect(-w / 2 - 22, -h / 2 - 28, w + 44, 28);
            // Bottom threshold
            ctx.fillStyle = 'rgba(90,80,68,0.8)';
            ctx.fillRect(-w / 2 - 22, h / 2 - 8, w + 44, 22);

            // Stone detail lines
            ctx.strokeStyle = 'rgba(40,30,20,0.5)'; ctx.lineWidth = 1;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(-w / 2 - 22, -h / 2 + i * (h / 4));
                ctx.lineTo(-w / 2, -h / 2 + i * (h / 4));
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(w / 2, -h / 2 + i * (h / 4));
                ctx.lineTo(w / 2 + 22, -h / 2 + i * (h / 4));
                ctx.stroke();
            }

            // The gate (two doors swinging open)
            const angle = openAmt * 1.1;
            // Left door
            ctx.save();
            ctx.translate(-w / 2 + 2, 0);
            ctx.transform(Math.cos(angle), 0, Math.sin(angle) * 0.4, 1, 0, 0);
            const dg1 = ctx.createLinearGradient(0, -h / 2, w / 2, h / 2);
            dg1.addColorStop(0, 'rgba(50,40,30,0.95)');
            dg1.addColorStop(1, 'rgba(80,60,40,0.9)');
            ctx.fillStyle = dg1;
            ctx.fillRect(0, -h / 2, w / 2 - 2, h);
            // door handle (bronze hinge)
            ctx.beginPath(); ctx.arc(w / 2 - 10, 0, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(160,120,40,0.9)'; ctx.fill();
            ctx.restore();

            // Right door
            ctx.save();
            ctx.translate(w / 2 - 2, 0);
            ctx.transform(Math.cos(angle), 0, -Math.sin(angle) * 0.4, 1, 0, 0);
            const dg2 = ctx.createLinearGradient(-w / 2, 0, 0, h / 2);
            dg2.addColorStop(0, 'rgba(80,60,40,0.9)');
            dg2.addColorStop(1, 'rgba(50,40,30,0.95)');
            ctx.fillStyle = dg2;
            ctx.fillRect(-w / 2 + 2, -h / 2, w / 2 - 2, h);
            ctx.beginPath(); ctx.arc(-w / 2 + 10, 0, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(160,120,40,0.9)'; ctx.fill();
            ctx.restore();

            // The abyss (hiante) inside
            if (openAmt > 0.01) {
                const abyss = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
                abyss.addColorStop(0, 'rgba(255,220,120,' + openAmt * 0.9 + ')');
                abyss.addColorStop(0.3, 'rgba(200,160,60,' + openAmt * 0.7 + ')');
                abyss.addColorStop(1, 'rgba(0,0,0,0.95)');
                ctx.fillStyle = abyss;
                ctx.fillRect(-w / 2 + 2, -h / 2, w - 4, h);
                // rays through the gap
                if (openAmt > 0.3) {
                    for (let i = -3; i <= 3; i++) {
                        const rx = (i / 3.5) * (w / 2 - 2);
                        ctx.beginPath();
                        ctx.moveTo(rx, -h / 2);
                        ctx.lineTo(rx + i * 30, -h / 2 - 120);
                        ctx.strokeStyle = `rgba(255,220,100,${openAmt * 0.15})`;
                        ctx.lineWidth = Math.abs(i) * 3 + 1; ctx.stroke();
                    }
                }
            }

            // Bronze hinges (gonzos de bronze)
            [[-w / 2 - 2,-h / 4], [-w / 2 - 2, h / 4], [w / 2,-h / 4], [w / 2, h / 4]].forEach(([bx, by]) => {
                const hg = ctx.createRadialGradient(bx, by, 0, bx, by, 8);
                hg.addColorStop(0, 'rgba(220,160,40,1)');
                hg.addColorStop(1, 'rgba(140,90,20,0.6)');
                ctx.fillStyle = hg;
                ctx.beginPath(); ctx.ellipse(bx, by, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
            });

            // Dike (Justiça) — key glyph
            if (openAmt < 0.15) {
                ctx.beginPath();
                ctx.moveTo(-8, h / 2 + 8); ctx.lineTo(-8, h / 2 + 24);
                ctx.moveTo(8, h / 2 + 8); ctx.lineTo(8, h / 2 + 24);
                ctx.moveTo(-14, h / 2 + 16); ctx.lineTo(14, h / 2 + 16);
                ctx.strokeStyle = 'rgba(220,180,80,0.7)'; ctx.lineWidth = 2; ctx.stroke();
                ctx.font = '10px Georgia';
                ctx.fillStyle = 'rgba(220,180,80,0.6)';
                ctx.textAlign = 'center';
                ctx.fillText('Δίκη', 0, h / 2 + 38);
            }

            // Flash on opening
            if (flash > 0) {
                const fg = ctx.createRadialGradient(0, 0, 0, 0, 0, w / 2);
                fg.addColorStop(0, `rgba(255,240,180,${flash * 0.8})`);
                fg.addColorStop(1, `rgba(255,220,80,0)`);
                ctx.fillStyle = fg;
                ctx.fillRect(-w / 2, -h / 2, w, h);
            }

            ctx.restore();
        }

        // --- Chariot wheel ---
        function drawWheel(x, y, angle) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            // outer ring
            ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(200,160,60,0.9)'; ctx.lineWidth = 3; ctx.stroke();
            // hub
            ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(220,180,80,1)'; ctx.fill();
            // spokes (8)
            for (let i = 0; i < 8; i++) {
                const a = i * Math.PI / 4;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 5, Math.sin(a) * 5);
                ctx.lineTo(Math.cos(a) * 21, Math.sin(a) * 21);
                ctx.strokeStyle = 'rgba(200,160,60,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
            }
            // axle glow (siringe/squeak effect — visual heat)
            const ag = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
            ag.addColorStop(0, 'rgba(255,160,60,0.6)');
            ag.addColorStop(1, 'rgba(255,160,60,0)');
            ctx.fillStyle = ag; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        // --- Night/Day sky blend ---
        function drawSky(dayAmt) {
            const w = W(), h = H();
            // Left (Night) → Right (Day) or depending on scene progress
            const sky = ctx.createLinearGradient(0, 0, w, h);
            sky.addColorStop(0, `rgb(${lerp(8, 10, dayAmt)},${lerp(4, 20, dayAmt)},${lerp(28, 60, dayAmt)})`);
            sky.addColorStop(0.4, `rgb(${lerp(16, 30, dayAmt)},${lerp(8, 50, dayAmt)},${lerp(50, 100, dayAmt)})`);
            sky.addColorStop(1, `rgb(${lerp(40, 255, dayAmt)},${lerp(20, 200, dayAmt)},${lerp(60, 80, dayAmt)})`);
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, w, h);
            // Horizon glow
            if (dayAmt > 0.2) {
                const hg = ctx.createRadialGradient(w * 0.75, h * 0.5, 0, w * 0.75, h * 0.5, h * 0.6);
                hg.addColorStop(0, `rgba(255,180,60,${dayAmt * 0.5})`);
                hg.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = hg; ctx.fillRect(0, 0, w, h);
            }
        }

        function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

        // --- Stars draw ---
        function drawStars(alpha) {
            stars.forEach(s => {
                s.twinkle += s.speed;
                const a = (0.5 + 0.5 * Math.sin(s.twinkle)) * alpha;
                ctx.beginPath();
                ctx.arc(s.x * W(), s.y * H(), s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(220,210,255,${a})`;
                ctx.fill();
            });
        }

        // --- Road (the famous path) ---
        function drawPath(cx, cy, progress) {
            const w = W(), h = H();
            ctx.save();
            // The golden road
            const pg = ctx.createLinearGradient(0, cy - 20, 0, h);
            pg.addColorStop(0, 'rgba(255,210,60,0.7)');
            pg.addColorStop(0.5, 'rgba(200,160,40,0.4)');
            pg.addColorStop(1, 'rgba(100,80,20,0.1)');
            // Perspective road shape
            ctx.beginPath();
            ctx.moveTo(cx - 200, h);
            ctx.lineTo(cx - 6, cy - 30);
            ctx.lineTo(cx + 6, cy - 30);
            ctx.lineTo(cx + 200, h);
            ctx.closePath();
            ctx.fillStyle = pg; ctx.fill();
            // Dashes (famous path markings)
            ctx.strokeStyle = 'rgba(255,230,100,0.4)'; ctx.lineWidth = 1.5; ctx.setLineDash([8, 12]);
            ctx.beginPath();
            ctx.moveTo(cx, h); ctx.lineTo(cx, cy - 30);
            ctx.stroke(); ctx.setLineDash([]);
            ctx.restore();
        }

        // --- Two paths (Being / Non-Being) ---
        function drawTwoPaths(cx, cy, revealT) {
            ctx.save();
            // Path of Being (bright, golden)
            const ba = revealT;
            ctx.globalAlpha = ba;
            ctx.beginPath();
            ctx.moveTo(cx, cy + 30);
            ctx.bezierCurveTo(cx - 60, cy - 40, cx - 130, cy - 80, cx - 200, cy - 110);
            const bp = ctx.createLinearGradient(cx, cy + 30, cx - 200, cy - 110);
            bp.addColorStop(0, 'rgba(255,220,80,0.9)');
            bp.addColorStop(1, 'rgba(255,240,160,0.3)');
            ctx.strokeStyle = bp; ctx.lineWidth = 5; ctx.stroke();
            // Label
            ctx.font = 'italic 13px Georgia';
            ctx.fillStyle = `rgba(255,230,100,${ba})`;
            ctx.fillText('ἔστιν — É, não pode não ser', cx - 260, cy - 115);
            ctx.font = '11px Georgia';
            ctx.fillStyle = `rgba(255,220,80,${ba * 0.6})`;
            ctx.fillText('caminho de confiança · acompanha a verdade', cx - 260, cy - 98);

            // Radiant dots along the path of Being
            for (let i = 0; i < 12; i++) {
                const s = i / 11;
                const bx = lerp(cx, cx - 200, s);
                const by = cubicBez(cy + 30, cy - 40, cy - 80, cy - 110, s);
                ctx.beginPath(); ctx.arc(bx, by, 2 + s * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,240,120,${ba * (0.4 + s * 0.5)})`;
                ctx.fill();
            }

            // Path of Non-Being (dark, fading, impossible)
            ctx.globalAlpha = ba * 0.6;
            ctx.beginPath();
            ctx.moveTo(cx, cy + 30);
            ctx.bezierCurveTo(cx + 60, cy - 30, cx + 100, cy - 40, cx + 140, cy - 30);
            ctx.setLineDash([6, 8]);
            const np = ctx.createLinearGradient(cx, cy + 30, cx + 140, cy - 30);
            np.addColorStop(0, 'rgba(120,100,180,0.6)');
            np.addColorStop(1, 'rgba(60,40,120,0.1)');
            ctx.strokeStyle = np; ctx.lineWidth = 3; ctx.stroke();
            ctx.setLineDash([]);
            // Fades to nothing — the path vanishes
            ctx.globalAlpha = ba;
            ctx.font = 'italic 13px Georgia';
            ctx.fillStyle = `rgba(160,140,220,${ba * 0.7})`;
            ctx.fillText('οὐκ ἔστιν — Não é, ignoto', cx + 155, cy - 28);
            ctx.font = '11px Georgia';
            ctx.fillStyle = `rgba(140,120,200,${ba * 0.5})`;
            ctx.fillText('não se pode conhecer · não se pode mostrar', cx + 155, cy - 12);

            // Question mark / void at end
            ctx.globalAlpha = ba * 0.5;
            ctx.font = 'bold 28px Georgia';
            ctx.fillStyle = 'rgba(100,80,180,0.5)';
            ctx.fillText('∅', cx + 148, cy - 38);

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function cubicBez(p0, p1, p2, p3, t) {
            const mt = 1 - t;
            return mt * mt * mt * p0 + 3 * mt * mt * t * p1 + 3 * mt * t * t * p2 + t * t * t * p3;
        }

        // --- Goddess ---
        function drawGoddess(x, y, alpha) {
            ctx.save(); ctx.translate(x, y); ctx.globalAlpha = alpha;
            // Radiant aura
            const ag = ctx.createRadialGradient(0, -60, 10, 0, -20, 140);
            ag.addColorStop(0, 'rgba(255,230,120,0.35)');
            ag.addColorStop(0.5, 'rgba(200,160,60,0.1)');
            ag.addColorStop(1, 'rgba(255,200,60,0)');
            ctx.fillStyle = ag; ctx.beginPath(); ctx.arc(0, -20, 140, 0, Math.PI * 2); ctx.fill();
            // Robe (tall)
            const rg = ctx.createLinearGradient(0, -100, 0, 90);
            rg.addColorStop(0, 'rgba(255,250,220,0.95)');
            rg.addColorStop(0.5, 'rgba(240,210,120,0.85)');
            rg.addColorStop(1, 'rgba(180,140,60,0.5)');
            ctx.beginPath();
            ctx.moveTo(-22, -100); ctx.bezierCurveTo(-28, -40, -32, 20, -36, 90);
            ctx.lineTo(36, 90); ctx.bezierCurveTo(32, 20, 28, -40, 22, -100);
            ctx.closePath(); ctx.fillStyle = rg; ctx.fill();
            // Mantle detail
            ctx.beginPath();
            ctx.moveTo(-8, -100);
            ctx.bezierCurveTo(-20, -60, -26, 0, -30, 90);
            ctx.strokeStyle = 'rgba(200,160,60,0.3)'; ctx.lineWidth = 1; ctx.stroke();
            // Head glow (divine)
            const hg = ctx.createRadialGradient(0, -118, 4, 0, -115, 28);
            hg.addColorStop(0, 'rgba(255,250,200,1)');
            hg.addColorStop(0.4, 'rgba(255,220,80,0.8)');
            hg.addColorStop(1, 'rgba(255,180,40,0)');
            ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(0, -115, 28, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(0, -115, 14, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,250,220,0.95)'; ctx.fill();
            // Crown rays
            for (let i = 0; i < 8; i++) {
                const a = i * Math.PI / 4 - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 13, -115 + Math.sin(a) * 13);
                ctx.lineTo(Math.cos(a) * 26, -115 + Math.sin(a) * 26);
                ctx.strokeStyle = 'rgba(255,220,80,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
            }
            // Extended hand (mão na mão direita)
            ctx.beginPath();
            ctx.moveTo(22, -50); ctx.bezierCurveTo(36, -40, 50, -30, 62, -24);
            ctx.strokeStyle = 'rgba(255,240,180,0.8)'; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.arc(62, -24, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,230,160,0.9)'; ctx.fill();
            // speech glow
            const sg = ctx.createRadialGradient(40, -40, 0, 40, -40, 50);
            sg.addColorStop(0, 'rgba(255,230,100,0.2)');
            sg.addColorStop(1, 'rgba(255,230,100,0)');
            ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(40, -40, 50, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        // --- Verses sequence ---
        const verses = [
            { scene: 0, frame: 60, text: 'Os corcéis que me transportam, tanto quanto o ânimo me impele,\nconduzem-me pelo caminho famoso da divindade...' },
            { scene: 1, frame: 20, text: 'O eixo silvava nos cubos como uma siringe, incandescendo,\nao ser movido pelas duas rodas vertiginosas...' },
            { scene: 2, frame: 30, text: 'Aí está o portal que separa os caminhos da Noite e do Dia,\nencimado por um dintel e um ombral de pedra...' },
            { scene: 3, frame: 20, text: '"Ò jovem... Salvè! Não foi um mau destino que te induziu a viajar\npor este caminho — tão fora do trilho dos homens..."' },
            { scene: 4, frame: 40, text: '...um que é, que não é para não ser — caminho de confiança.\nO outro que não é — esse é caminho em tudo ignoto.' }
        ];
        let lastVerse = -1;

        function updateVerse() {
            verses.forEach((v, i) => {
                if (scene === v.scene && sceneT >= v.frame && lastVerse < i) {
                    lastVerse = i;
                    const el = document.getElementById('verse');
                    el.classList.remove('visible');
                    el.textContent = v.text;
                    setTimeout(() => el.classList.add('visible'), 50);
                }
            });
        }

        // --- Scene transitions ---
        function getSceneAlpha(duration) {
            const fadeIn = 30, fadeOut = 30;
            if (sceneT < fadeIn) return sceneT / fadeIn;
            if (sceneT > duration - fadeOut) return (duration - sceneT) / fadeOut;
            return 1;
        }

        // ===== MAIN DRAW =====
        function draw() {
            const w = W(), h = H();
            ctx.clearRect(0, 0, w, h);

            const cx = w * 0.5, cy = h * 0.48;

            // Determine day amount across scenes
            const dayAmt =
                scene === 0 ? sceneT / SCENE_DUR[0] * 0.3 :
                    scene === 1 ? 0.3 + sceneT / SCENE_DUR[1] * 0.2 :
                        scene === 2 ? 0.5 + sceneT / SCENE_DUR[2] * 0.3 :
                            scene === 3 ? 0.8 + sceneT / SCENE_DUR[3] * 0.15 :
                                0.95;

            drawSky(dayAmt);
            drawStars(Math.max(0, 1 - dayAmt * 2));
            updateParticles();
            drawParticles(Math.max(0, 1 - dayAmt * 1.5));

            // ===== SCENE 0: The Journey =====
            if (scene === 0) {
                const a = getSceneAlpha(SCENE_DUR[0]);
                ctx.globalAlpha = a;
                // Road
                drawPath(cx, cy - 60, sceneT / SCENE_DUR[0]);
                // Chariot & horses moving right
                const moveX = cx - 120 + (sceneT / SCENE_DUR[0]) * 60;
                const moveY = cy + 20;
                // Chariot body
                ctx.save();
                ctx.translate(moveX, moveY);
                const chg = ctx.createLinearGradient(-30, -15, 30, 15);
                chg.addColorStop(0, 'rgba(200,160,50,0.95)');
                chg.addColorStop(1, 'rgba(140,100,20,0.9)');
                ctx.fillStyle = chg;
                ctx.beginPath();
                ctx.moveTo(-30, 0); ctx.lineTo(-30, -25); ctx.lineTo(30, -25); ctx.lineTo(30, 0);
                ctx.bezierCurveTo(20, 8, -20, 8, -30, 0); ctx.closePath(); ctx.fill();
                ctx.strokeStyle = 'rgba(220,180,60,0.5)'; ctx.lineWidth = 1; ctx.stroke();
                // Axle
                ctx.beginPath(); ctx.moveTo(-40, 8); ctx.lineTo(40, 8);
                ctx.strokeStyle = 'rgba(180,140,40,0.8)'; ctx.lineWidth = 3; ctx.stroke();
                ctx.restore();
                // Wheels
                const wangle = t * 0.15;
                drawWheel(moveX - 34, moveY + 8, wangle);
                drawWheel(moveX + 34, moveY + 8, wangle);
                // Horses ahead
                horses.forEach(h => h.draw(moveX + 80, moveY - 14, true));
                // Maidens alongside
                maidens.forEach(m => m.draw(moveX + m.xOff * 0.5 + 30, moveY + 10));
                // "Famoso" golden road label
                if (sceneT > 80) {
                    ctx.font = 'italic 11px Georgia';
                    ctx.fillStyle = `rgba(255,220,80,${Math.min(1, (sceneT - 80) / 40) * 0.55})`;
                    ctx.textAlign = 'center';
                    ctx.fillText('ὁδός — o caminho famoso da divindade', cx, cy + h * 0.18);
                }
                ctx.globalAlpha = 1;
            }

            // ===== SCENE 1: The Axle Sings =====
            else if (scene === 1) {
                const a = getSceneAlpha(SCENE_DUR[1]);
                ctx.globalAlpha = a;
                drawPath(cx, cy - 40, 1);
                // Closer view: one wheel, spinning fast, glowing axle
                const wangle = t * 0.6;
                drawWheel(cx, cy + 30, wangle);
                // Siringe sound waves
                for (let i = 1; i <= 6; i++) {
                    const r = 30 + i * 22 + Math.sin(t * 0.2) * 5;
                    const wa = Math.max(0, 1 - i * 0.16) * 0.4 * a;
                    ctx.beginPath(); ctx.arc(cx, cy + 30, r, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,200,80,${wa})`; ctx.lineWidth = 1; ctx.stroke();
                }
                // Hub fire (incandescent)
                const hg = ctx.createRadialGradient(cx, cy + 30, 0, cx, cy + 30, 18);
                hg.addColorStop(0, 'rgba(255,200,60,0.9)');
                hg.addColorStop(0.5, 'rgba(255,120,20,0.4)');
                hg.addColorStop(1, 'rgba(255,60,0,0)');
                ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(cx, cy + 30, 18, 0, Math.PI * 2); ctx.fill();
                // Maidens faint in bg
                maidens.forEach(m => m.draw(cx + m.xOff * 0.7, cy - 20));
                horses.forEach(h => h.draw(cx + 70 + h.ox * 0.4, cy - 30, true));
                ctx.globalAlpha = 1;
            }

            // ===== SCENE 2: The Portal =====
            else if (scene === 2) {
                const a = getSceneAlpha(SCENE_DUR[2]);
                const openProg = Math.max(0, (sceneT - 80) / 200);
                const openAmt = Math.min(1, openProg) * 1.2;
                const flash = Math.max(0, 1 - openProg * 3) * a;
                ctx.globalAlpha = a;
                // Stars still visible in night side
                // Maidens at portal
                maidens.forEach((m, i) => {
                    m.draw(cx + (m.xOff > 0 ? m.xOff * 0.6 + 10 : m.xOff * 0.6 - 10), cy + 70);
                });
                // The portal
                drawPortal(cx, cy - 20, Math.min(1.2, openAmt), flash);
                // Light spill from opening
                if (openAmt > 0.1) {
                    const lg = ctx.createRadialGradient(cx, cy - 20, 0, cx, cy - 20, 200);
                    lg.addColorStop(0, `rgba(255,220,100,${Math.min(openAmt, 1) * 0.25})`);
                    lg.addColorStop(1, 'rgba(255,220,100,0)');
                    ctx.fillStyle = lg; ctx.fillRect(0, 0, w, h);
                }
                ctx.globalAlpha = 1;
            }

            // ===== SCENE 3: The Goddess Speaks =====
            else if (scene === 3) {
                const a = getSceneAlpha(SCENE_DUR[3]);
                const godA = Math.min(1, sceneT / 80) * a;
                ctx.globalAlpha = a;
                // Through the portal — bright side
                const bgG = ctx.createLinearGradient(0, 0, 0, h);
                bgG.addColorStop(0, 'rgba(255,220,80,0.08)');
                bgG.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = bgG; ctx.fillRect(0, 0, w, h);
                // Goddess center
                drawGoddess(cx, cy - 60, godA);
                // Young person (hand in hand)
                ctx.save(); ctx.translate(cx + 90, cy + 10); ctx.globalAlpha = godA;
                const yg = ctx.createLinearGradient(0, -60, 0, 60);
                yg.addColorStop(0, 'rgba(200,220,255,0.9)');
                yg.addColorStop(1, 'rgba(120,140,200,0.4)');
                ctx.beginPath();
                ctx.moveTo(-12, -60); ctx.bezierCurveTo(-14, -20, -16, 10, -18, 60);
                ctx.lineTo(18, 60); ctx.bezierCurveTo(16, 10, 14, -20, 12, -60);
                ctx.closePath(); ctx.fillStyle = yg; ctx.fill();
                // head
                const hhg = ctx.createRadialGradient(0, -72, 3, 0, -70, 14);
                hhg.addColorStop(0, 'rgba(220,220,255,0.9)');
                hhg.addColorStop(1, 'rgba(180,180,240,0)');
                ctx.fillStyle = hhg; ctx.beginPath(); ctx.arc(0, -70, 12, 0, Math.PI * 2); ctx.fill();
                // hand extended to goddess
                ctx.beginPath(); ctx.moveTo(-12, -20); ctx.lineTo(-42, -28);
                ctx.strokeStyle = 'rgba(200,220,255,0.7)'; ctx.lineWidth = 2.5; ctx.stroke();
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            // ===== SCENE 4: Two Paths =====
            else if (scene === 4) {
                const a = Math.min(1, sceneT / 60);
                ctx.globalAlpha = a;
                // Bright dawn sky already done
                // Central glow at origin
                const og = ctx.createRadialGradient(cx, cy + 40, 0, cx, cy + 40, 80);
                og.addColorStop(0, 'rgba(255,230,100,0.4)');
                og.addColorStop(1, 'rgba(255,200,60,0)');
                ctx.fillStyle = og; ctx.beginPath(); ctx.arc(cx, cy + 40, 80, 0, Math.PI * 2); ctx.fill();
                // Origin point
                ctx.beginPath(); ctx.arc(cx, cy + 30, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,240,150,0.95)'; ctx.fill();
                ctx.beginPath(); ctx.arc(cx, cy + 30, 12, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,220,80,0.4)'; ctx.lineWidth = 2; ctx.stroke();
                // Two paths diverge
                const rev = Math.min(1, (sceneT - 30) / 100);
                drawTwoPaths(cx, cy + 30, rev);
                // Inabalável (truth) glyph top
                if (sceneT > 120) {
                    const ta = Math.min(1, (sceneT - 120) / 60) * a;
                    ctx.globalAlpha = ta;
                    ctx.font = 'italic 14px Georgia';
                    ctx.fillStyle = `rgba(255,230,100,0.8)`;
                    ctx.textAlign = 'center';
                    ctx.fillText('ἀλήθεια — realidade fidedigna', cx - 160, cy - 90);
                    ctx.font = '11px Georgia';
                    ctx.fillStyle = 'rgba(255,200,80,0.5)';
                    ctx.fillText('o coração inabalável da verdade', cx - 160, cy - 74);
                }
                ctx.globalAlpha = 1;
            }

            // Advance time
            updateVerse();
            t++;
            sceneT++;

            const dur = SCENE_DUR[scene];
            if (scene < SCENES.length - 1 && sceneT >= dur) {
                scene++;
                sceneT = 0;
            }
            // Loop last scene forever
            if (scene === SCENES.length - 1 && sceneT >= 600) {
                sceneT = 300;
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
