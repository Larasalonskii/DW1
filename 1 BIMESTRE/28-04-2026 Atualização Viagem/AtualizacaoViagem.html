<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Audiência</title>
    <link rel="stylesheet" href="AtualizacaoViagem.css">
</head>

<body>
    <main>
        <header>
            <h1>Registrar Autorização</h1>
        </header>

        <section>
            <form action="FormularioViagem.html" method="GET" onsubmit="return validarformulario()">

                <div class="campo">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" required>
                </div>

                <div class="campo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" required>
                </div>

                <div class="campo">
                    <label for="nomer">Nome Completo Responsável:</label>
                    <input type="text" id="nomer" name="nomer" required>
                </div>

                <div class="campo">
                    <label for="cidadeo">Cidade De Origem:</label>
                    <input type="text" id="cidadeo" name="cidadeo" required>
                </div>

                <div class="campo">
                    <label for="cidaded">Cidade De Destino:</label>
                    <input type="text" id="cidaded" name="cidaded" required>
                </div>

                <div class="campo">
                    <label for="modalidade">Modalidade:</label>
                    <select id="inputmodalidade" name="modalidade" required>
                        <option value="">Selecione</option>
                        <option value="volei">Volêi</option>
                        <option value="futebol">Futebol</option>
                        <option value="natacao">Natação</option>
                    </select>
                </div>
                <input type="hidden" id="categoria" name="categoria">
                
                
                
                <button type="submit">Gerar Documento Oficial</button>
            </form>
        </section>
    </main>
</body>

</html>

<script>
    function validarformulario() {
        var idade = Number(document.getElementById("idade").value);
        let categoria = "";
        
        if (isNaN(idade)) {
            alert("Digite uma idade válida");
            return false;
        }
        
        if (idade < 7) {
        alert("O atleta não possui a idade mínima");
        return false;
    } 
    else if (idade <= 11) {
        categoria = "Infantil";
    } 
    else if (idade <= 13) {
        categoria = "Pré-Adolescente";
    } 
    else if (idade <= 18) {
        categoria = "Adolescente";
    } 
    else {
        alert("O torneio é restrito a menores de idade");
        return false;
    }
    
    // joga a categoria no input escondido
    document.getElementById("categoria").value = categoria;
    
    return true;
}
</script>
</body>

</html>
