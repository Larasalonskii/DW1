<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Audiência</title>
    <link rel="stylesheet" href="AtualizacaoViagem.css">
</head>

<body>
    <main>
        <header>
            <h1>Registrar Convocação</h1>
        </header>

        <section>
            <form action="FormularioViagem.html" method="GET">

                <div class="campo">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" required>
                </div>

                <div class="campo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="idade">Idade:</label>
                    <input type="text" id="idade" name="idade" required>
                </div>

                <div class="campo">
                    <label for="nomer">Nome Completo Responsável:</label>
                    <input type="text" id="nomer" name="nomer" required>
                </div>

                <div class="campo">
                    <label for="cidadeo">Cidade De Origem:</label>
                    <input type="text" id="cidadeo" name="cidadeo" required>
                </div>

                <div class="campo">
                    <label for="cidaded">Cidade De Destino:</label>
                    <input type="text" id="cidaded" name="cidaded" required>
                </div>

                <div class="campo">
                    <label for="modalidade">Modalidade:</label>
                    <select id="inputmodalidade" name="Modalidade" required>
                        <option value="">Selecione</option>
                        <option value="volei">Volêi</option>
                        <option value="futebol">Futebol</option>
                        <option value="natacao">Natação</option>
                    </select>
                </div>



                <button type="submit">Gerar Documento Oficial</button>
            </form>
        </section>
    </main>
</body>

</html>

<script>
    function validarformulario() {
        var cpf = document.getElementById("inputcpf").value;
        var nome = document.getElementById("inputnome").value;
        var idade = parseInt(document.getElementById("inputidade").value);
        var nomer = document.getElementById("inputnomer").value;
        var cidadeo = document.getElementById("inputcidadeo").value;
        var cidaded = document.getElementById("inputcidaded").value;
        var modalidade = document.getElementById("inputmodalidade").ariaSelected;

        let classificacao = "";
        if (idade < 7) {
            alert("O atleta não possúi a idade míninma")
            return false
        } else if (idade >= 7 && idade <= 11) {
            classificacao = "Infantil";
            return true
        } else if (idade >= 12 && idade <= 13) {
            classificacao = "Pré-Adolescente";
            return true
        } else if (idade >= 14 && idade <= 18) {
            classificacao = "Adolescente";
            return true
        } else {
            alert("O torneio é restrito a menores de Idade")
            return false
        }
    }
</script>
</body>

</html>
